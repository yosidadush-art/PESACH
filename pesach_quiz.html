<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>חידון הלכות פסח</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<script>
function confetti(opts){
  opts=opts||{};
  var count=opts.particleCount||80;
  var colors=opts.colors||['#c8861a','#f5c842','#fff','#7a9e3b','#c0392b'];
  var ox=(opts.origin&&opts.origin.x!=null)?opts.origin.x:0.5;
  var oy=(opts.origin&&opts.origin.y!=null)?opts.origin.y:0.5;
  var spread=opts.spread||70;
  var sv=opts.startVelocity||30;
  var angle=(opts.angle||90);
  var gravity=(opts.gravity!=null)?opts.gravity:1;
  var container=document.getElementById('confetti-container');
  if(!container){container=document.createElement('div');container.id='confetti-container';container.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:2147483647;overflow:hidden;';document.body.appendChild(container);}
  for(var i=0;i<count;i++){(function(){
    var el=document.createElement('div');
    var color=colors[Math.floor(Math.random()*colors.length)];
    var size=6+Math.random()*8;
    var isCircle=Math.random()<0.4;
    var isRibbon=!isCircle&&Math.random()<0.4;
    var startX=ox*100,startY=oy*100;
    var a=(angle+(Math.random()-0.5)*spread)*Math.PI/180;
    var vx=Math.cos(a)*sv*(0.5+Math.random()*0.8);
    var vy=-Math.sin(a)*sv*(0.5+Math.random()*0.8);
    el.style.cssText=['position:absolute','left:'+startX+'%','top:'+startY+'%','width:'+(isRibbon?3:size)+'px','height:'+(isRibbon?size*2:isCircle?size:size*0.6)+'px','background:'+color,'border-radius:'+(isCircle?'50%':'2px'),'opacity:1','will-change:transform,opacity'].join(';');
    container.appendChild(el);
    var startTime=Date.now(),duration=1200+Math.random()*1000,rotSpeed=(Math.random()-0.5)*15,rot=Math.random()*360,curX=0,curY=0;
    function frame(){var elapsed=Date.now()-startTime,t=elapsed/duration;if(t>=1){el.style.opacity='0';if(el.parentNode)el.parentNode.removeChild(el);return;}curX+=vx*0.016;curY+=vy*0.016;vy+=gravity*0.4;vx*=0.99;rot+=rotSpeed;var fade=t>0.7?1-(t-0.7)/0.3:1;el.style.transform='translate('+curX+'vw,'+curY+'vh) rotate('+rot+'deg)';el.style.opacity=fade;requestAnimationFrame(frame);}
    requestAnimationFrame(frame);
  })();}
}
</script>
<style>
:root{
  --bg0:#1a0800;
  --gold:#f5c842;
  --gold2:#ffd966;
  --gold-glow:rgba(245,200,66,0.45);
  --amber:#c8861a;
  --amber2:#e8a83a;
  --red:#c0392b;
  --red-glow:rgba(192,57,43,0.4);
  --green:#7a9e3b;
  --green-glow:rgba(122,158,59,0.4);
  --cream:#f5e6c8;
  --text:#f5e6c8;
  --text-dim:rgba(220,190,140,0.55);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{width:100%;height:100%;overflow:hidden;}
body{width:100%;height:100%;background:var(--bg0);font-family:'Heebo',sans-serif;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;color:var(--text);}

#bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 160% 80% at 50% -10%,#3d1a00 0%,#1a0800 55%),
    radial-gradient(ellipse 70% 50% at 95% 100%,#2a1000 0%,transparent 60%),
    radial-gradient(ellipse 55% 45% at 5% 85%,#200c00 0%,transparent 60%),
    radial-gradient(ellipse 40% 35% at 80% 20%,#2e1400 0%,transparent 50%);}

#stars{position:fixed;inset:0;z-index:2;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:rgba(245,200,66,0.6);animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:0.03;}to{opacity:0.5;}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:1;animation:orbPulse ease-in-out infinite alternate;}
@keyframes orbPulse{from{opacity:0.18;transform:scale(0.88);}to{opacity:0.45;transform:scale(1.1);}}
#scanlines{position:fixed;inset:0;z-index:2;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);pointer-events:none;}

#accent-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;background:linear-gradient(90deg,transparent,#8b4513,#c8861a,#f5c842,#c8861a,#8b4513,transparent);opacity:0.95;animation:barShift 6s linear infinite;}
@keyframes barShift{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}

#screen{position:relative;z-index:10;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:3px;padding-bottom:80px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

/* NAME SCREEN */
#name-screen{position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#3d1a00 0%,#100400 100%);}
.name-card{background:linear-gradient(160deg,rgba(200,134,26,0.10) 0%,rgba(20,6,0,0.97) 100%);border:1.5px solid rgba(245,200,66,0.35);border-radius:28px;padding:48px 48px 42px;max-width:500px;width:92%;text-align:center;box-shadow:0 0 90px rgba(200,134,26,0.14),0 30px 70px rgba(0,0,0,0.7);display:flex;flex-direction:column;gap:22px;align-items:center;position:relative;overflow:hidden;}
.name-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--amber),var(--gold),var(--amber),transparent);}
.name-icon{font-size:3.8rem;line-height:1;filter:drop-shadow(0 0 22px var(--gold-glow));}
.name-title{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.8rem,5.5vw,2.8rem);font-weight:700;color:#fff;line-height:1.2;text-shadow:0 0 30px var(--gold-glow);}
.name-chapter{font-size:0.88rem;font-weight:600;color:var(--gold2);letter-spacing:0.1em;background:rgba(245,200,66,0.10);border:1px solid rgba(245,200,66,0.28);border-radius:20px;padding:5px 18px;}
.name-subtitle{font-size:0.9rem;color:var(--text-dim);line-height:1.7;max-width:350px;}
.name-input-wrap{width:100%;position:relative;}
.name-input-wrap::after{content:'✍';position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:0.95rem;pointer-events:none;opacity:0.45;}
#player-name{width:100%;background:rgba(245,200,66,0.05);border:1.5px solid rgba(245,200,66,0.30);border-radius:14px;padding:15px 42px 15px 15px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;outline:none;text-align:right;direction:rtl;transition:border-color 0.25s,box-shadow 0.25s;}
#player-name:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(245,200,66,0.18);}
#player-name::placeholder{color:var(--text-dim);font-weight:400;}
.name-start-btn{width:100%;background:linear-gradient(135deg,#7a3d00,var(--gold2));color:#1a0800;border:none;border-radius:50px;padding:16px 50px;font-family:'Heebo',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;letter-spacing:0.04em;box-shadow:0 6px 30px var(--gold-glow);transition:transform 0.2s,box-shadow 0.2s,filter 0.2s;animation:btnPulse 2.5s ease-in-out infinite;}
@keyframes btnPulse{0%,100%{box-shadow:0 6px 30px var(--gold-glow);}50%{box-shadow:0 6px 46px rgba(245,200,66,0.65),0 0 0 6px rgba(245,200,66,0.09);}}
.name-start-btn:hover{transform:translateY(-2px) scale(1.03);filter:brightness(1.12);animation:none;}
.name-stats{display:flex;gap:24px;border-top:1px solid rgba(245,200,66,0.14);padding-top:18px;width:100%;justify-content:center;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.stat-num{font-size:1.35rem;font-weight:900;color:var(--gold2);}
.stat-label{font-size:0.7rem;color:var(--text-dim);font-weight:600;letter-spacing:0.06em;}

/* TOP BAR */
#top-bar{width:100%;padding:10px 20px 8px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(245,200,66,0.12);background:linear-gradient(180deg,rgba(20,6,0,0.98) 0%,rgba(20,6,0,0) 100%);}
#show-title{font-family:'Frank Ruhl Libre',serif;font-size:clamp(0.85rem,1.8vw,1.2rem);font-weight:700;color:var(--gold2);text-shadow:0 0 16px var(--gold-glow);}
#player-display{font-size:0.74rem;font-weight:700;color:var(--amber);background:rgba(245,200,66,0.09);border:1px solid rgba(245,200,66,0.20);border-radius:20px;padding:3px 11px;}
#progress-pills{display:flex;gap:3px;align-items:center;flex-wrap:wrap;max-width:280px;}
.progress-pip{width:15px;height:4px;border-radius:2px;background:rgba(220,180,100,0.06);transition:background 0.35s,box-shadow 0.35s;}
.progress-pip.done{background:rgba(200,134,26,0.18);}
.progress-pip.correct{background:var(--green);}
.progress-pip.wrong{background:var(--red);}
.progress-pip.active{background:var(--gold2);box-shadow:0 0 8px var(--gold);}
#question-counter{font-size:clamp(0.7rem,1.2vw,0.82rem);color:var(--text-dim);font-weight:700;letter-spacing:0.1em;}

/* TIMER */
#timer-wrap{position:relative;width:96px;height:96px;margin:6px auto 2px;flex-shrink:0;}
#timer-svg{position:absolute;inset:0;transform:rotate(-90deg);}
#timer-track{fill:none;stroke:rgba(220,180,100,0.06);stroke-width:7;}
#timer-arc{fill:none;stroke:var(--gold2);stroke-width:7;stroke-linecap:round;stroke-dasharray:263;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.4s;filter:drop-shadow(0 0 6px var(--gold));}
#timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:900;font-family:'Frank Ruhl Libre',serif;color:var(--gold2);text-shadow:0 0 18px var(--gold-glow);transition:color 0.3s;}

/* QUESTION BOX */
#q-container{width:94%;max-width:840px;flex-shrink:0;position:relative;}
#q-box{background:linear-gradient(160deg,rgba(80,40,0,0.55) 0%,rgba(20,8,0,0.97) 60%,rgba(10,4,0,0.99) 100%);border:2px solid rgba(245,200,66,0.38);border-radius:24px;padding:22px 36px;text-align:center;font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.5rem,3.8vw,2.3rem);font-weight:700;color:#fff;line-height:1.65;box-shadow:0 0 80px rgba(200,134,26,0.14),0 12px 50px rgba(0,0,0,0.6),inset 0 1px 0 rgba(245,200,100,0.06);min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;gap:10px;}
#q-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold2),var(--amber2),var(--green),var(--gold2),transparent);opacity:0.85;}
#q-box::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(245,200,66,0.55),transparent);animation:scanLine 3.5s linear infinite;pointer-events:none;}
@keyframes scanLine{from{top:-2px;}to{top:calc(100% + 2px);}}
#q-num-badge{font-family:'Heebo',sans-serif;font-size:0.75rem;font-weight:800;letter-spacing:0.12em;color:var(--gold2);background:rgba(245,200,66,0.12);border:1px solid rgba(245,200,66,0.30);border-radius:20px;padding:4px 16px;flex-shrink:0;}
#q-text{display:block;text-shadow:0 0 40px rgba(245,200,66,0.14);}
@keyframes qEnter{from{opacity:0;transform:translateY(14px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.q-enter{animation:qEnter 0.45s cubic-bezier(0.22,1,0.36,1) both;}

/* QUESTION IMAGE */
#q-img-wrap{width:94%;max-width:840px;flex-shrink:0;display:none;border-radius:18px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.5);border:1.5px solid rgba(245,200,66,0.22);margin-bottom:-4px;}
#q-img-wrap.show{display:block;}
#q-img{width:100%;max-height:220px;object-fit:cover;display:block;}
.img-caption{font-size:0.72rem;color:rgba(245,200,66,0.55);text-align:center;padding:4px 10px 6px;background:rgba(20,6,0,0.85);font-family:'Heebo',sans-serif;font-weight:600;letter-spacing:0.04em;}
/* ANSWERS */
#a-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:94%;max-width:840px;flex-shrink:0;}
.ans-btn{position:relative;background:linear-gradient(160deg,rgba(80,40,5,0.45) 0%,rgba(15,6,0,0.92) 100%);border:1.5px solid rgba(200,134,26,0.28);border-radius:16px;padding:0;cursor:pointer;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;min-height:62px;color:var(--text);text-align:right;direction:rtl;}
.ans-btn:hover:not(:disabled){border-color:rgba(245,200,66,0.55);box-shadow:0 0 22px rgba(245,200,66,0.18);transform:translateY(-2px);}
.ans-fill{position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity 0.18s;}
.ans-btn:hover .ans-fill:not(.ans-btn.correct .ans-fill):not(.ans-btn.wrong .ans-fill){opacity:0.04;}
.ans-inner{position:relative;z-index:1;display:flex;align-items:center;gap:12px;padding:14px 16px;}
.ans-letter{font-family:'Frank Ruhl Libre',serif;font-size:1.05rem;font-weight:900;color:var(--gold2);background:rgba(245,200,66,0.10);border:1px solid rgba(245,200,66,0.28);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,color 0.2s;}
.ans-text{font-size:clamp(0.9rem,2.2vw,1.1rem);font-weight:600;line-height:1.45;flex:1;}
.ans-btn.correct{border-color:var(--green);box-shadow:0 0 28px var(--green-glow);animation:correctPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;}
.ans-btn.correct .ans-fill{background:var(--green);opacity:0.18;}
.ans-btn.correct .ans-letter{background:var(--green);color:#fff;border-color:var(--green);}
@keyframes correctPop{0%{transform:scale(0.95);}60%{transform:scale(1.04);}100%{transform:scale(1);}}
.ans-btn.wrong{border-color:var(--red);box-shadow:0 0 22px var(--red-glow);}
.ans-btn.wrong .ans-fill{background:var(--red);opacity:0.18;}
.ans-btn.wrong .ans-letter{background:var(--red);color:#fff;border-color:var(--red);}
.ans-btn.dim{opacity:0.35;}

/* FEEDBACK */
#feedback-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.18s;}
#feedback-overlay.show{opacity:1;}
#feedback-overlay.hide{opacity:0;}
#feedback-msg{font-family:'Frank Ruhl Libre',serif;font-size:clamp(2.2rem,6vw,4rem);font-weight:900;text-shadow:0 0 40px currentColor,0 4px 16px rgba(0,0,0,0.6);animation:feedPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes feedPop{from{transform:scale(0.6) translateY(20px);}to{transform:scale(1) translateY(0);}}
#correct-flash{position:fixed;inset:0;z-index:190;pointer-events:none;background:rgba(122,158,59,0.10);opacity:0;transition:opacity 0.12s;}
#correct-flash.show{opacity:1;}
#wrong-flash{position:fixed;inset:0;z-index:190;pointer-events:none;background:rgba(192,57,43,0.12);opacity:0;transition:opacity 0.22s;}
#wrong-flash.show{opacity:1;}

/* NAV BAR */
#nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:500;padding:10px 16px 14px;display:none;justify-content:space-between;align-items:center;background:linear-gradient(0deg,rgba(20,6,0,1) 0%,rgba(20,6,0,0.88) 100%);border-top:1px solid rgba(245,200,66,0.12);}
.btn-nav{background:linear-gradient(135deg,rgba(80,40,5,0.6),rgba(40,18,0,0.95));border:1.5px solid rgba(200,134,26,0.35);border-radius:50px;padding:12px 28px;font-family:'Heebo',sans-serif;font-size:0.88rem;font-weight:800;color:var(--gold2);cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;touch-action:manipulation;position:relative;z-index:500;-webkit-tap-highlight-color:transparent;}
.btn-nav:hover{background:linear-gradient(135deg,rgba(120,65,10,0.7),rgba(60,28,0,0.95));border-color:var(--gold2);box-shadow:0 4px 20px var(--gold-glow);}
.btn-nav:disabled{opacity:0.28;cursor:default;}
#btn-next{background:linear-gradient(135deg,#6b3500,var(--amber2));color:#1a0800;border-color:var(--amber);box-shadow:0 4px 20px var(--gold-glow);animation:btnGlow 2.5s ease-in-out infinite;}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 20px var(--gold-glow);}50%{box-shadow:0 4px 36px rgba(245,200,66,0.7),0 0 0 5px rgba(245,200,66,0.08);}}
#btn-next:disabled{opacity:0.28;animation:none;}
#streak-badge{position:fixed;top:14%;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:900;font-family:'Frank Ruhl Libre',serif;background:linear-gradient(135deg,rgba(40,20,0,0.96),rgba(80,40,5,0.98));border:1.5px solid var(--amber);border-radius:40px;padding:8px 22px;color:var(--gold2);opacity:0;transform:translateX(-50%) scale(0.8);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;box-shadow:0 0 20px rgba(245,200,66,0.25);text-shadow:0 0 10px rgba(245,200,66,0.6);}
#streak-badge.show{opacity:1;transform:translateX(-50%) scale(1);}

/* TRANSITION */
#wipe{position:fixed;inset:0;z-index:9000;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,#4a2200 0%,#1a0800 100%);transform:scaleY(0);transform-origin:top;transition:transform 0.35s cubic-bezier(0.55,0,0.45,1);}
#wipe.open{transform:scaleY(1);transform-origin:top;}
#wipe.close{transform:scaleY(0);transform-origin:bottom;transition:transform 0.38s cubic-bezier(0.55,0,0.45,1);}
#transition-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9600;font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.1rem,3vw,1.7rem);font-weight:700;color:var(--gold2);text-shadow:0 0 30px var(--gold-glow);opacity:0;transition:opacity 0.3s;pointer-events:none;text-align:center;}
#transition-label.show{opacity:1;}

/* END SCREEN */
#end-screen{display:none;position:fixed;inset:0;z-index:300;background:radial-gradient(ellipse at 50% 35%,#3d1a00 0%,#100400 100%);flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;gap:6px;padding:20px 20px 40px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#end-screen.show{display:flex;animation:endScreenIn 0.7s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes endScreenIn{from{opacity:0;transform:scale(1.06);}to{opacity:1;transform:scale(1);}}
#end-emblem{font-size:2.6rem;line-height:1;flex-shrink:0;animation:emblemFloat 2.2s ease-in-out infinite alternate;filter:drop-shadow(0 0 22px rgba(245,200,66,0.6));}
@keyframes emblemFloat{from{transform:translateY(-6px) scale(0.96);}to{transform:translateY(6px) scale(1.04);}}
#end-name-line{font-family:'Frank Ruhl Libre',serif;font-size:clamp(0.92rem,2vw,1.25rem);font-weight:700;color:var(--gold2);text-shadow:0 0 18px var(--gold-glow);letter-spacing:0.06em;}
#end-title{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.55rem,4.3vw,2.8rem);font-weight:700;color:#fff;}
#end-subtitle{font-size:clamp(0.8rem,1.5vw,1rem);color:var(--text-dim);max-width:400px;line-height:1.5;}
#end-score-row{display:flex;align-items:center;gap:12px;background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.22);border-radius:20px;padding:15px 26px;}
.score-block{display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-num{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.9rem,5.5vw,3.5rem);font-weight:700;color:var(--gold2);line-height:1;}
.score-label{font-size:0.77rem;color:var(--text-dim);font-weight:600;}
.score-div{width:1px;height:50px;background:rgba(245,200,66,0.20);}
#end-rank{font-family:'Frank Ruhl Libre',serif;font-size:clamp(0.9rem,1.9vw,1.2rem);font-weight:700;padding:9px 22px;border-radius:50px;background:linear-gradient(135deg,rgba(245,200,66,0.14),rgba(245,200,66,0.04));border:1px solid rgba(245,200,66,0.28);color:var(--gold2);}
#email-section{width:100%;max-width:460px;background:rgba(30,12,0,0.75);border:1.5px solid rgba(245,200,66,0.25);border-radius:16px;padding:12px 16px;display:flex;flex-direction:column;gap:7px;align-items:center;flex-shrink:0;}
#email-title{font-size:0.9rem;font-weight:800;color:var(--text);letter-spacing:0.04em;}
#email-subtitle{font-size:0.76rem;color:var(--text-dim);line-height:1.5;text-align:center;}
#email-status{font-size:0.78rem;min-height:18px;font-weight:700;color:var(--green);text-align:center;}
.share-row{display:flex;gap:8px;width:100%;}
#sheets-btn{width:100%;background:linear-gradient(135deg,#4a1e00,var(--amber2));color:#1a0800;border:none;border-radius:11px;padding:14px;font-family:'Heebo',sans-serif;font-size:0.95rem;font-weight:900;cursor:pointer;box-shadow:0 4px 20px var(--gold-glow);transition:transform 0.2s,filter 0.2s;animation:btnGlow2 2.5s ease-in-out infinite;}
@keyframes btnGlow2{0%,100%{box-shadow:0 4px 20px var(--gold-glow);}50%{box-shadow:0 4px 36px rgba(245,200,66,0.7),0 0 0 5px rgba(245,200,66,0.08);}}
#sheets-btn:disabled{opacity:0.5;cursor:default;animation:none;}
#whatsapp-btn{width:100%;background:rgba(40,140,70,0.12);color:rgba(60,200,100,0.85);border:1px solid rgba(40,180,80,0.3);border-radius:11px;padding:10px;font-family:'Heebo',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
#whatsapp-btn:hover{background:rgba(40,140,70,0.22);}
.end-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.end-action-btn{background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.22);border-radius:11px;padding:10px 20px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:700;color:var(--gold2);cursor:pointer;transition:all 0.2s;}
.end-action-btn:hover{background:rgba(245,200,66,0.16);}

@media(max-width:520px){
  #a-grid{grid-template-columns:1fr;}
  .btn-nav{padding:12px 20px;touch-action:manipulation;}
  .share-row{flex-direction:column;}
  #timer-wrap{width:76px;height:76px;margin:4px auto 2px;}
  #timer-num{font-size:1.9rem;}
  #q-box{font-size:clamp(1.15rem,4.5vw,1.6rem);padding:18px 20px 16px;}
  .ans-inner{padding:12px 14px;gap:10px;}
  .ans-text{font-size:clamp(0.9rem,3.8vw,1.05rem);}
  .name-card{padding:28px 20px 24px;}
  #screen{padding-bottom:90px;}
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="stars"></div>
<div id="scanlines"></div>
<div id="accent-bar"></div>
<div id="wipe"></div>
<div id="transition-label"></div>
<div id="correct-flash"></div>
<div id="wrong-flash"></div>
<div id="feedback-overlay"><div id="feedback-msg"></div></div>

<!-- NAME SCREEN -->
<div id="name-screen">
  <div class="name-card">
    <div class="name-icon">🍷</div>
    <div class="name-title">חידון הלכות פסח</div>
    <div class="name-chapter">🔟 עשרים שאלות · הלכה למעשה</div>
    <div class="name-subtitle">בדוק את עצמך על עיקרי הלכות החג</div>
    <div class="name-input-wrap">
      <input id="player-name" type="text" placeholder="הכנס שם..." maxlength="24" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="name-start-btn" onclick="startQuiz()">🚀 התחל חידון</button>
    <div class="name-stats">
      <div class="stat-item"><div class="stat-num">20</div><div class="stat-label">שאלות</div></div>
      <div class="stat-item"><div class="stat-num">30</div><div class="stat-label">שניות לשאלה</div></div>
      <div class="stat-item"><div class="stat-num">4</div><div class="stat-label">תשובות</div></div>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen" style="display:none;">
  <div id="top-bar">
    <div id="show-title">🍷 חידון הלכות פסח</div>
    <div id="progress-pills"></div>
    <div id="question-counter"></div>
    <div id="player-display"></div>
  </div>
  <div id="timer-wrap">
    <svg id="timer-svg" viewBox="0 0 96 96"><circle id="timer-track" cx="48" cy="48" r="42"/><circle id="timer-arc" cx="48" cy="48" r="42"/></svg>
    <div id="timer-num">30</div>
  </div>
  <div id="q-container"><div id="q-box"><div id="q-num-badge"></div><span id="q-text"></span></div></div>
  <div id="q-img-wrap"><img id="q-img" src="" alt=""><div class="img-caption" id="img-caption"></div></div>
  <div id="a-grid"></div>
  <div id="streak-badge"></div>
</div>

<!-- NAV BAR -->
<div id="nav-bar">
  <button class="btn-nav" onclick="goBack()">◀ קודם</button>
  <button class="btn-nav" id="btn-next" onclick="fwd()" disabled>הבא ▶</button>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-emblem">🏆</div>
  <div id="end-name-line"></div>
  <div id="end-title">סיימת את החידון!</div>
  <div id="end-subtitle">הלכות פסח — חידון מסכם</div>
  <div id="end-score-row">
    <div class="score-block"><div class="score-num" id="end-correct">0</div><div class="score-label">נכון</div></div>
    <div class="score-div"></div>
    <div class="score-block"><div class="score-num" id="end-total">20</div><div class="score-label">שאלות</div></div>
    <div class="score-div"></div>
    <div class="score-block"><div class="score-num" id="end-pct">0%</div><div class="score-label">אחוז</div></div>
  </div>
  <div id="end-rank"></div>
  <div id="email-section">
    <div id="email-title">📊 שלח ציון למורה</div>
    <div id="email-subtitle">לחץ לרישום הציון בטבלת המורה</div>
    <button id="sheets-btn" onclick="sendToSheets()">📊 שלח ציון למורה</button>
    <button id="whatsapp-btn" onclick="sendWhatsApp()">💬 שלח בוואטסאפ</button>
    <div id="email-status"></div>
  </div>
  <div class="end-actions">
    <button class="end-action-btn" onclick="resetGame()">🔄 שחק שוב</button>
  </div>
</div>

  {q:'מהו הדין לגבי שטיפת ידיים בשלב "ורחץ"?',a:['נוטלים ידיים עם ברכה','לא נוטלים ידיים כלל','נוטלים ידיים ללא ברכה','שוטפים רק את האצבעות'],c:2},
  {q:'מדוע אסור לאכול מצה ביום י"ד בניסן?',a:['כי היא נחשבת חמץ עד הלילה','כדי שיאכל לתאווה בליל פסח','כי לא גמרו לאפות','כדי לא לבזות את המצווה'],c:1},
  {q:'עד מתי צריך לאכול את האפיקומן לכתחילה?',a:['לפני צאת הכוכבים','לפני חצות','לפני עלות השחר','אין זמן מוגדר'],c:1},
  {q:'מה ההבדל בין ספרדים לאשכנזים לגבי ירק המרור?',a:['ספרדים מברכים על המרור פעמיים','ספרדים עיקר מצוותם בחסה, אשכנזים בחזרת','אשכנזים לא אוכלים מרור בכורך','ספרדים לא אוכלים מרור בכלל'],c:1},
  {q:'מה הדין לגבי בשר צלי בסעודת ליל הסדר?',a:['מותר לכתחילה','מותר רק עוף צלוי','אסור זכר לקרבן פסח','אסור רק אם הוא כבש'],c:2},
  {q:'מי שאכל מצה בלי הסיבה בליל הסדר — מה דינו?',a:['יצא ידי חובה לכולם','לא יצא לפי השו"ע וצריך לחזור ולאכול','יצא רק אם הוא זקן או חולה','לא יצא לדעת כולם'],c:1},
  {q:'כמה כוסות יין שותים בליל הסדר ומה הן כנגד?',a:['שלוש, כנגד האבות','ארבע, כנגד ארבע לשונות הגאולה','חמש, כנגד חמשה חומשי תורה','שתיים, כנגד לחמי התודה'],c:1},
  {q:'חמץ שנמכר לגוי לפני פסח כדין — מה דינו לאחר פסח?',a:['אסור לעולם','אסור רק ביום טוב האחרון','מותר לאחר פסח','המכירה אינה מועילה כלל'],c:2},
  {q:'אדם ששכח לומר "פסח מצה ומרור" בהגדה — מה דינו?',a:['יצא ידי חובה כי אכל אותם','חייב לחזור ולקרוא את כל ההגדה','לא יצא ידי חובתו','צריך להוסיף כוס חמישית'],c:2},
];

const TIMER_MAX=30, CIRC=263;
let questions=[],answerResults=[],current=0,streak=0,answered=false,playerName='תלמיד',timerInterval=null,timerSec=TIMER_MAX;
let endSeqT1=null,endSeqT2=null,endSeqT3=null;

function buildQuestions(){return QUESTIONS_DATA.map((q,i)=>Object.assign({},q,{_origIdx:i})).sort(()=>Math.random()-0.5);}
function recount(){return answerResults.filter(x=>x===true).length;}

// ══════════════════════════ STARS ══════════════════════════
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+0.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    c.appendChild(s);
  }
  // orbs
  [{c:'rgba(200,134,26,0.18)',w:400,h:300,x:20,y:20,dur:14},{c:'rgba(122,158,59,0.12)',w:300,h:250,x:70,y:60,dur:18},{c:'rgba(192,57,43,0.10)',w:350,h:280,x:40,y:80,dur:11}].forEach(o=>{
    const el=document.createElement('div');el.className='orb';
    el.style.cssText=`width:${o.w}px;height:${o.h}px;left:calc(${o.x}% - ${o.w/2}px);top:calc(${o.y}% - ${o.h/2}px);background:${o.c};animation-duration:${o.dur}s;`;
    document.body.appendChild(el);

})();

// ══════════════════════════ START ══════════════════════════
function startQuiz(){
  const n=document.getElementById('player-name').value.trim();
  playerName=n||'תלמיד';
  document.getElementById('player-display').textContent='👤 '+playerName;
  document.getElementById('name-screen').style.display='none';
  const es=document.getElementById('end-screen');es.classList.remove('show');es.style.display='none';
  document.getElementById('transition-label').classList.remove('show');
  document.getElementById('screen').style.display='flex';
  document.getElementById('screen').style.visibility='visible';
  document.getElementById('nav-bar').style.display='flex';
  questions=buildQuestions();
  answerResults=new Array(questions.length).fill(null);
  streak=0;current=0;answered=false;
  document.getElementById('feedback-overlay').classList.remove('show','hide');
  buildProgressPills();show(false);
}
document.getElementById('player-name').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});

// ══════════════════════════ PILLS ══════════════════════════
function buildProgressPills(){
  const c=document.getElementById('progress-pills');c.innerHTML='';
  questions.forEach((_,i)=>{const p=document.createElement('div');p.className='progress-pip';p.id=`pip-${i}`;c.appendChild(p);});
}
function updateProgressPills(){
  questions.forEach((_,i)=>{
    const p=document.getElementById(`pip-${i}`);if(!p)return;
    p.className='progress-pip';
    if(i===current)p.classList.add('active');
    else if(answerResults[i]===true)p.classList.add('correct');
    else if(answerResults[i]===false)p.classList.add('wrong');
    else if(i<current)p.classList.add('done');
  });
}

// ══════════════════════════ TIMER ══════════════════════════
function setTimerArc(sec){
  const arc=document.getElementById('timer-arc'),num=document.getElementById('timer-num');
  arc.style.strokeDashoffset=CIRC*(1-sec/TIMER_MAX);
  if(sec<=4){arc.style.stroke='#c0392b';arc.style.filter='drop-shadow(0 0 8px #c0392b)';num.style.color='#e05050';}
  else if(sec<=8){arc.style.stroke='#e8a83a';arc.style.filter='drop-shadow(0 0 6px #e8a83a)';num.style.color='#ffd066';}
  else{arc.style.stroke='var(--gold2)';arc.style.filter='drop-shadow(0 0 6px var(--gold))';num.style.color='var(--gold2)';}
}
function startTimer(){
  clearInterval(timerInterval);timerSec=TIMER_MAX;
  document.getElementById('timer-num').textContent=timerSec;setTimerArc(timerSec);
  timerInterval=setInterval(()=>{
    timerSec--;document.getElementById('timer-num').textContent=timerSec;setTimerArc(timerSec);
    if(timerSec<=4)playUrgentTick();else playTick();
    if(timerSec<=0){clearInterval(timerInterval);playTimerEnd();select(-1);}
  },1000);
}
function stopTimer(){clearInterval(timerInterval);}

// ══════════════════════════ SHOW ══════════════════════════
function show(animate=true){
  document.getElementById('feedback-overlay').classList.remove('show','hide');
  answered=(answerResults[current]!==null);
  document.getElementById('btn-next').disabled=!answered;
  const data=questions[current];
  document.getElementById('question-counter').textContent=`שאלה ${current+1} / ${questions.length}`;
  document.getElementById('q-num-badge').textContent=`שאלה ${current+1}`;
  updateProgressPills();
  const qBox=document.getElementById('q-box');
  document.getElementById('q-text').textContent=data.q;
  // Show question image
  (function(){
    var imgKey = Q_IMAGES[data._origIdx !== undefined ? data._origIdx : 0];
    var wrap = document.getElementById('q-img-wrap');
    var imgEl = document.getElementById('q-img');
    var cap = document.getElementById('img-caption');
    if(imgKey && IMGS[imgKey]){
      imgEl.src = IMGS[imgKey];
      cap.textContent = CAPTIONS[imgKey] || '';
      wrap.classList.add('show');
    } else {
      wrap.classList.remove('show');
      imgEl.src = '';
    }
  })();
  if(animate){qBox.classList.remove('q-enter');void qBox.offsetWidth;qBox.classList.add('q-enter');}
  const grid=document.getElementById('a-grid');grid.innerHTML='';
  const letters=['א','ב','ג','ד'];
  data.a.forEach((txt,i)=>{
    const btn=document.createElement('button');btn.className='ans-btn';btn.id=`ans-${i}`;
    btn.innerHTML=`<div class="ans-fill"></div><div class="ans-inner"><div class="ans-letter">${letters[i]}</div><div class="ans-text">${txt}</div></div>`;
    if(answered){
      btn.style.pointerEvents='none';
      if(i===data.c)btn.classList.add('correct');else btn.classList.add('dim');
    } else {
      let _startY=0,_startX=0,_didTouch=false;
      btn.addEventListener('touchstart',function(e){_startY=e.touches[0].clientY;_startX=e.touches[0].clientX;_didTouch=true;},{passive:true});
      btn.addEventListener('touchend',function(e){const dy=e.changedTouches[0].clientY-_startY,dx=Math.abs(e.changedTouches[0].clientX-_startX);if(Math.abs(dy)>20||dx>20)return;e.preventDefault();select(i);},{passive:false});
      btn.addEventListener('click',function(){if(!_didTouch)select(i);});
    }
    grid.appendChild(btn);
  });
  if(answered){stopTimer();setTimerArc(0);document.getElementById('timer-num').textContent='✓';}
  else{startTimer();if(animate)playRevealQuestion();}
}

// ══════════════════════════ SELECT ══════════════════════════
function select(idx){
  if(answered)return;
  answered=true;stopTimer();
  const correct=questions[current].c;
  const buttons=document.querySelectorAll('.ans-btn');
  buttons.forEach(b=>b.style.pointerEvents='none');
  const alreadyAnswered=(answerResults[current]!==null);
  if(idx===correct){
    if(!alreadyAnswered)answerResults[current]=true;
    streak++;buttons[idx].classList.add('correct');
    buttons.forEach((b,i)=>{if(i!==idx)b.classList.add('dim');});
    showFeedback('✓ נכון!','#7ab832');playCorrect();updateProgressPills();
    if(streak>=2){const badge=document.getElementById('streak-badge');badge.textContent=`🔥 רצף של ${streak}!`;badge.classList.add('show');setTimeout(()=>badge.classList.remove('show'),2000);if(streak>=3)playStreak();}
    document.getElementById('correct-flash').classList.add('show');setTimeout(()=>document.getElementById('correct-flash').classList.remove('show'),180);
    setTimeout(()=>{
      confetti({particleCount:160,spread:80,origin:{y:0.55},colors:['#f5c842','#e8a83a','#fff','#7a9e3b']});
      confetti({particleCount:60,angle:65,spread:55,origin:{x:0,y:0.6},colors:['#c8861a','#7a9e3b']});
      confetti({particleCount:60,angle:115,spread:55,origin:{x:1,y:0.6},colors:['#f5c842','#c0392b']});
    },150);
  } else {
    if(!alreadyAnswered)answerResults[current]=false;
    streak=0;document.getElementById('streak-badge').classList.remove('show');
    if(idx!==-1)buttons[idx].classList.add('wrong');
    buttons[correct].classList.add('correct');
    buttons.forEach((b,i)=>{if(i!==idx&&i!==correct)b.classList.add('dim');});
    showFeedback('✗ טעות!','#c0392b');playWrong();updateProgressPills();
    const flash=document.getElementById('wrong-flash');flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),400);
    screenShake();
  }
  setTimerArc(0);document.getElementById('timer-num').textContent='✓';
  var btnNext=document.getElementById('btn-next');
  btnNext.disabled=false;
  btnNext.style.pointerEvents='auto';
}

// ══════════════════════════ FEEDBACK ══════════════════════════
function showFeedback(text,color){
  const overlay=document.getElementById('feedback-overlay'),msg=document.getElementById('feedback-msg');
  msg.textContent=text;msg.style.color=color;
  overlay.classList.remove('hide');overlay.classList.add('show');
  setTimeout(()=>{overlay.classList.add('hide');setTimeout(()=>overlay.classList.remove('show','hide'),220);},900);
}

// ══════════════════════════ NAV ══════════════════════════
function goBack(){if(current>0){current--;doTransition(()=>show(true));}}
function fwd(){if(!answered)return;current++;if(current>=questions.length){showEndScreen();return;}doTransition(()=>show(true));}

function doTransition(cb){
  const wipe=document.getElementById('wipe'),lbl=document.getElementById('transition-label');
  wipe.classList.add('open');
  lbl.textContent='שאלה '+(current+1)+' מתוך '+questions.length;
  setTimeout(()=>lbl.classList.add('show'),250);
  setTimeout(()=>{lbl.classList.remove('show');cb();setTimeout(()=>{wipe.classList.remove('open');wipe.classList.add('close');setTimeout(()=>wipe.classList.remove('close'),450);},100);},1400);
}

// ══════════════════════════ END ══════════════════════════
function showEndScreen(){
  document.getElementById('screen').style.display='none';
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('transition-label').classList.remove('show');
  playFinale();
  const score=recount(),total=questions.length,pct=Math.round((score/total)*100);
  document.getElementById('end-correct').textContent=score;
  document.getElementById('end-total').textContent=total;
  document.getElementById('end-pct').textContent=pct+'%';
  document.getElementById('end-name-line').textContent='👤 '+playerName;
  let rank='';
  if(pct===100)rank='👑 מלך החידון!';
  else if(pct>=85)rank='⭐ מצוין!';
  else if(pct>=70)rank='📜 טוב מאוד!';
  else if(pct>=55)rank='🔍 סביר';
  else rank='📚 כדאי לחזור';
  document.getElementById('end-rank').textContent=rank;
  buildEndOverlay(pct,score,total,rank);
}

  document.getElementById('screen').style.display='none';

// ══════════════════════════ RESET ══════════════════════════
function resetGame(){
  [endSeqT1,endSeqT2,endSeqT3].forEach(t=>{if(t)clearTimeout(t);});endSeqT1=endSeqT2=endSeqT3=null;
  const endOv=document.getElementById('end-ov');if(endOv&&endOv.parentNode)endOv.parentNode.removeChild(endOv);
  ['trophy-left','trophy-right'].forEach(id=>{const el=document.getElementById(id);if(el&&el.parentNode)el.parentNode.removeChild(el);});
  const cc=document.getElementById('confetti-container');if(cc)cc.innerHTML='';
  current=0;streak=0;answered=false;
  questions=buildQuestions();answerResults=new Array(questions.length).fill(null);
  document.getElementById('feedback-overlay').classList.remove('show','hide');
  document.getElementById('transition-label').classList.remove('show');document.getElementById('transition-label').textContent='';
  stopTimer();
  const es=document.getElementById('end-screen');es.classList.remove('show');es.style.display='';

  document.getElementById('screen').style.display='flex';document.getElementById('screen').style.visibility='visible';
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('name-screen').style.display='flex';
}

function sendToSheets(){
  const score=recount(),pct=Math.round((score/questions.length)*100);
  const btn=document.getElementById('sheets-btn'),statusEl=document.getElementById('email-status');
  btn.disabled=true;btn.textContent='⏳ שולח...';statusEl.textContent='';
  const now=new Date().toLocaleDateString('he-IL',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const params=new URLSearchParams({name:playerName,score:score+'/'+questions.length,pct:pct+'%',errors:questions.length-score,time:now,quiz:'הלכות פסח'});
  fetch(SCRIPT_URL+'?'+params.toString(),{method:'GET',mode:'no-cors'})
    .then(()=>{btn.textContent='✅ נשלח!';btn.style.background='linear-gradient(135deg,#3a5a10,#7a9e3b)';btn.style.color='#1a0800';setStatus('✅ הציון נרשם אצל המורה!',8000);})
    .catch(()=>{btn.disabled=false;btn.textContent='📊 שלח ציון למורה';setStatus('❌ שגיאה — נסה וואטסאפ',4000,'#c0392b');});
}
function sendWhatsApp(){
  const score=recount(),pct=Math.round((score/questions.length)*100);
  const msg='📚 חידון הלכות פסח\n👤 שם: '+playerName+'\n✅ ציון: '+score+'/'+questions.length+' ('+pct+'%)\n❌ טעויות: '+(questions.length-score)+'\n📅 '+new Date().toLocaleDateString('he-IL',{year:'numeric',month:'long',day:'numeric'});
  window.open('https://wa.me/'+TEACHER_PHONE+'?text='+encodeURIComponent(msg),'_blank');
  setStatus('✅ וואטסאפ נפתח — לחץ שלח!',4000);
}
function setStatus(msg,dur,color='#7ab832'){const el=document.getElementById('email-status');el.textContent=msg;el.style.color=color;setTimeout(()=>el.textContent='',dur);}

// ══════════════════════════ FX ══════════════════════════
function screenShake(){const el=document.getElementById('screen');let i=0;const seq=[[6,-3],[-6,4],[5,-5],[-4,3],[3,-2],[-2,1],[0,0]];(function next(){if(i>=seq.length){el.style.transform='';return;}el.style.transform='translate('+seq[i][0]+'px,'+seq[i][1]+'px)';i++;setTimeout(next,55);})();}

// ══════════════════════════ AUDIO ══════════════════════════
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,dur,vol=0.07,type='sine',delay=0){try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime+delay);g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur+0.05);}catch(e){}}
function noise(dur,vol=0.04,delay=0){try{const ctx=getAudio(),buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);const src=ctx.createBufferSource();src.buffer=buf;const g=ctx.createGain(),f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=2200;f.Q.value=0.5;g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(vol,ctx.currentTime+delay+0.01);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(ctx.currentTime+delay);}catch(e){}}
function playTick(){tone(300,0.04,0.03,'square');}
function playUrgentTick(){tone(660,0.06,0.07,'square');tone(990,0.04,0.04,'sine',0.06);}
function playCorrect(){[0,100,200,300].forEach((d,i)=>{tone([528,660,792,1056][i],0.35,0.1,'sine',d/1000);});setTimeout(()=>{for(let i=0;i<10;i++)tone(600+Math.random()*700,0.25,0.03,'sine',i*0.04);},360);noise(0.15,0.03,0.05);}
function playWrong(){tone(200,0.55,0.12,'sawtooth');tone(150,0.8,0.08,'sawtooth',0.22);noise(0.3,0.04);}
function playRevealQuestion(){tone(440,0.1,0.05,'sine');tone(554,0.1,0.05,'sine',0.1);tone(660,0.12,0.06,'sine',0.2);}
function playFinale(){const m=[528,660,792,660,792,1056,792,1056,1320];m.forEach((f,i)=>tone(f,0.3,0.13,'sine',i*0.16));setTimeout(()=>{for(let i=0;i<12;i++)tone(700+Math.random()*900,0.28,0.04,'sine',i*0.05);},1100);}
function playStreak(){[880,1100,1320].forEach((f,i)=>tone(f,0.2,0.07,'sine',i*0.08));}
function playTimerEnd(){tone(150,1.2,0.14,'sawtooth');noise(0.5,0.05);}
function playNextQuestion(){tone(440,0.08,0.05,'sine');tone(660,0.1,0.07,'sine',0.1);}
document.addEventListener('click',()=>{try{getAudio().resume();}catch(e){}},{once:true});
</script>
